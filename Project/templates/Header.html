<header>
    <!-- Десктоп: верхнее меню -->

                <li><a href="catalog.html#how-to-choose-honey">Как выбрать мед?</a></li>
            </ul>
        </nav>
    </div>

    <!-- Десктоп: основная часть -->
    <table class="main-header">

            <td class="logo-block">
                <img src="images/logo-placeholder.png" alt="лого" width="65">

                    <strong>ЧАСТНАЯ ПАСИКА</strong>

            </td>
            <td class="search-block">
                <div class="search-wrap">
                    <input type="text" placeholder="Поиск...">
                </div>
            </td>
            <td class="phone-block">
                <table>
                    <tr>
                        <td><img src="images/phone-icon.png"></td>
                        <td>
                            <strong>+375 (33) 628-86-72</strong>
                            <small>Принимаем звонки с 8 до 16</small>
                        </td>
                    </tr>
                </table>
            </td>
            <td class="cart-block">
                <img src="images/Market-icon.png" alt="корзина">

                <div class="cart-links">

                    <a href="#">ПОДЕЛИТЬСЯ</a>
                </div>

        </tr>

    <!-- Мобильная шапка -->
    <div class="mobile-header">
        <div class="mobile-top">
            <div class="logo-block">
                <img src="images/logo-placeholder.png" alt="лого" width="45">
                <div class="logo-text">
                    <strong>ЧАСТНАЯ ПАСИКА</strong>
                    <span>ЗПОИС23</span>
                </div>
            </div>
            <img src="images/Market-icon.png" alt="корзина" class="mobile-cart-icon">

        <hr class="mobile-divider">
        <div class="mobile-bottom">
            <button class="burger">☰</button>
            <input type="text" class="mobile-search" placeholder="Поиск...">
            <img src="images/phone-icon.png" class="mobile-phone-icon" alt="Телефон">
        </div>
    </div>

    <!-- Общая жёлтая полоса -->
    <div class="header-bar">
        <div class="breadcrumbs">Главная → Каталог → Пчелиный мёд</div>
        <h1>НАТУРАЛЬНЫЙ МЁД ОТ ПЧЕЛОВОДА</h1>
