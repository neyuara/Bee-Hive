<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alegreya+SC:wght@400;700&family=Alegreya+Sans+SC:wght@800&family=Alegreya+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base-layout.css">



<header>
    <!-- Верхнее меню -->
    <div class="top-menu">
        <nav>
            <ul>
                <li><a href="#">Главная</a></li>
                <li><a href="#">Каталог</a></li>
                <li><a href="#">Гарантия</a></li>
                <li><a href="#">Отзывы</a></li>
                <li><a href="#">Контакты</a></li>
                <li><a href="#">Как выбрать мед?</a></li>
            </ul>
        </nav>
    </div>

    <!-- Основная часть хедера -->
    <table border="0"  width="100%" class="main-header">
        <tr>
            <!-- Логотип -->
            <td class="logo-block" >
                <img src="../images/logo-placeholder.png" alt="лого" width="65">
                <div class="logo-text">
                    <strong>ЧАСТНАЯ ПАСИКА</strong>
                    <span>ЗПОИС23</span>
                </div>
            </td>

            <!-- Поиск -->
            <td class="search-block">
                    <div class="search-block">
                        <input type="text" placeholder="Поиск...">
                    </div>
            </td>

            <!-- Телефон -->
            <td class="phone-block">
                <strong>+375 (33) 628-86-72</strong>
                <small>Принимаем звонки с 8 до 16</small>
            </td>

            <!-- Корзина -->
            <td class="cart-block">
                <img src="../images/Market-icon.png" alt="корзина">
                <div class="cart-quantity">1</div>
                <div class="cart-links">
                    <a href="#">В КОРЗИНУ</a>
                    <a href="#">ПОДЕЛИТЬСЯ</a>
                </div>
            </td>
        </tr>
    </table>

    <!-- Жёлтая полоса -->
    <div class="header-bar">
        <div class="breadcrumbs">
            Главная → Каталог → Пчелиный мёд
        </div>
        <h1>Натуральный мёд от пчеловода</h1>
    </div>
</header>
